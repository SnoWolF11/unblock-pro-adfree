<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="50%" style="stop-color:#111128"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)"/>
  <circle cx="200" cy="200" r="300" fill="url(#glow)" opacity="0.3"/>
  <circle cx="1000" cy="200" r="250" fill="url(#glow)" opacity="0.2"/>
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
  </g>
  <rect x="430" y="100" width="80" height="80" rx="18" fill="url(#accent)"/>
  <text x="470" y="157" font-family="Arial, sans-serif" font-size="48" font-weight="900" fill="white" text-anchor="middle">U</text>
  <text x="530" y="152" font-family="Arial, sans-serif" font-size="48" font-weight="800" fill="white">UnblockPro</text>
  <text x="600" y="230" font-family="Arial, sans-serif" font-size="22" fill="#a0a0b0" text-anchor="middle">DPI Bypass for Discord and YouTube</text>
  <text x="600" y="265" font-family="Arial, sans-serif" font-size="18" fill="#606080" text-anchor="middle">macOS + Windows | Open Source | One Click</text>
  <g font-family="Arial, sans-serif" font-size="13">
    <rect x="370" y="290" width="90" height="28" rx="14" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="415" y="309" fill="#3b82f6" text-anchor="middle">Discord</text>
    <rect x="475" y="290" width="90" height="28" rx="14" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-opacity="0.3" stroke-width="1"/>
    <text x="520" y="309" fill="#ef4444" text-anchor="middle">YouTube</text>
    <rect x="580" y="290" width="80" height="28" rx="14" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-opacity="0.3" stroke-width="1"/>
    <text x="620" y="309" fill="#10b981" text-anchor="middle">macOS</text>
    <rect x="675" y="290" width="90" height="28" rx="14" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="720" y="309" fill="#8b5cf6" text-anchor="middle">Windows</text>
  </g>
  <rect x="0" y="0" width="1200" height="400" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="2"/>
