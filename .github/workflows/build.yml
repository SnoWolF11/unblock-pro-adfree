name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Setup Python (for DMG)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Create bin directory
        run: mkdir -p bin/darwin
      
      - name: Build macOS
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            dist/*.dmg
            dist/*.zip
          retention-days: 5

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Create bin directory
        run: mkdir bin\win32
        shell: cmd
      
      - name: Build Windows
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: |
            dist/*.exe
          retention-days: 5

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: artifacts/mac
      
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: win-build
          path: artifacts/win
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: UnblockPro ${{ github.ref_name }}
          body: |
            ## UnblockPro ${{ github.ref_name }}
            
            ### Скачать
            
            | Платформа | Файл | Описание |
            |-----------|------|----------|
            | macOS | `UnblockPro-*-mac.dmg` | Установщик для macOS |
            | macOS | `UnblockPro-*-mac.zip` | Портативная версия для macOS |
            | Windows | `UnblockPro-*-win-setup.exe` | Установщик для Windows |
            | Windows | `UnblockPro-*-win-portable.exe` | Портативная версия для Windows |
            
            ### Что нового
            
            - Автоматический подбор стратегии обхода DPI
            - Поддержка macOS и Windows
            - Автозапуск и автоподключение
            - Безопасная очистка прокси-настроек
            
            ---
            **by sonic**
          draft: false
          prerelease: false
          files: |
            artifacts/mac/*
            artifacts/win/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
