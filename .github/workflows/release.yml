name: Build and Publish Releases

on:
  push:
    tags:
      - 'v*adfree*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download zapret binaries
        run: npm run download-binaries || true

      - name: Build macOS
        run: npm run build:mac

      - name: Upload mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac
          path: |
            dist/*.zip
            dist/*.yml
            dist/*.blockmap

  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download zapret binaries
        run: npm run download-binaries || powershell -Command "exit 0"

      - name: Build Windows
        run: npm run build:win

      - name: Upload win artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win
          path: |
            dist/*.exe
            dist/*.yml
            dist/*.blockmap

  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download mac artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac
          path: dist/mac

      - name: Download win artifacts
        uses: actions/download-artifact@v4
        with:
          name: win
          path: dist/win

      - name: Extract version from tag
        id: vars
        run: |
          RAW="${GITHUB_REF_NAME#v}"
          CLEAN="${RAW%-adfree*}"
          echo "version=$CLEAN" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: UnblockPro_Adfree-${{ steps.vars.outputs.version }}
          files: |
            dist/mac/*
            dist/win/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
